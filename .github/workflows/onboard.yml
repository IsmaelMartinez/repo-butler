name: Onboard Repos

on:
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated list of owner/repo to onboard'
        required: true

# Cross-repo writes use the GitHub App token generated in the job, not the
# workflow GITHUB_TOKEN — the default token only needs read access for checkout.
permissions:
  contents: read

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Onboard repos
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ONBOARD_REPOS: ${{ github.event.inputs.repos }}
        run: |
          if [ -z "$ONBOARD_REPOS" ]; then
            echo "No repos to onboard."
            exit 0
          fi
          echo "Onboarding: $ONBOARD_REPOS"
          node src/onboard.js
