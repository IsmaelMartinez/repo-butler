name: Onboard Repos

on:
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated list of owner/repo to onboard'
        required: true

# Cross-repo writes use the GitHub App token generated in the job, not the
# workflow GITHUB_TOKEN — the default token only needs read access for checkout.
permissions:
  contents: read

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Onboard repos
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ONBOARD_REPOS: ${{ github.event.inputs.repos }}
        run: |
          if [ -z "$ONBOARD_REPOS" ]; then
            echo "No repos to onboard."
            exit 0
          fi
          echo "Onboarding: $ONBOARD_REPOS"
          node src/onboard.js
