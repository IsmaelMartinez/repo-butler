name: Repo Butler

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase to run (observe, report, assess, all)'
        required: false
        default: 'report'
      dry-run:
        description: 'Dry run (true/false)'
        required: false
        default: 'true'
      force-report:
        description: 'Force report regeneration even if unchanged'
        type: boolean
        required: false
        default: false

permissions:
  issues: write
  pull-requests: write
  contents: write
  pages: write
  id-token: write
  security-events: read

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      has-reports: ${{ steps.check.outputs.has-reports }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Repo Butler
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_PHASE: ${{ github.event.inputs.phase || 'report' }}
          INPUT_CONFIG_PATH: .github/roadmap.yml
          INPUT_DRY_RUN: ${{ github.event.inputs.dry-run || 'true' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TRIAGE_BOT_INGEST_SECRET: ${{ secrets.TRIAGE_BOT_INGEST_SECRET }}
          REPORT_OUTPUT_DIR: reports
          REPORT_FORCE: ${{ github.event.inputs.force-report }}
        run: node src/index.js

      - name: Check reports exist
        id: check
        run: |
          if [ -d reports ] && [ -f reports/index.html ]; then
            echo "has-reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-reports=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        if: steps.check.outputs.has-reports == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: reports

  deploy-pages:
    if: needs.run.outputs.has-reports == 'true'
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
