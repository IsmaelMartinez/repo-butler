name: Repo Butler

on:
  schedule:
    # Four runs daily across UK waking hours (no overnight runs):
    #   07:00 UTC (08:00 BST / 07:00 GMT — morning)
    #   11:00 UTC (12:00 BST / 11:00 GMT — midday)
    #   16:00 UTC (17:00 BST / 16:00 GMT — late afternoon)
    #   20:00 UTC (21:00 BST / 20:00 GMT — evening)
    # GitHub cron is best-effort — may be delayed or dropped during high-demand
    # periods (observed ~80% miss rate on this repo). The push trigger below
    # acts as a reliable fallback; four cron times also gives more chances
    # to catch a successful run per day.
    - cron: '0 7,11,16,20 * * *'
  push:
    branches: [main]
    paths:
      # Re-run the report when pipeline code or workflow config changes.
      - 'src/report*.js'
      - 'src/observe.js'
      - 'src/store.js'
      - '.github/workflows/self-test.yml'
      - '.github/roadmap.yml'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase(s) to run. Single phase, comma-separated list (e.g. "observe,assess,update,governance,report"), or "all".'
        required: false
        default: 'observe,assess,update,governance,report'
      dry-run:
        description: 'Dry run (true/false)'
        required: false
        default: 'true'
      force-report:
        description: 'Force report regeneration even if unchanged'
        type: boolean
        required: false
        default: false

# All pipeline writes (issues, PRs, data branch) use the GitHub App token
# generated below, not the workflow GITHUB_TOKEN — so the default token only
# needs read access for checkout. Pages permissions live on the deploy job.
permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      has-reports: ${{ steps.check.outputs.has-reports }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Repo Butler
        id: butler
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_PHASE: ${{ github.event.inputs.phase || 'observe,assess,update,governance,report' }}
          INPUT_CONFIG_PATH: .github/roadmap.yml
          INPUT_DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          REPORT_OUTPUT_DIR: reports
          REPORT_FORCE: ${{ github.event.inputs.force-report || github.event_name != 'workflow_dispatch' }}
        run: node src/index.js

      - name: Check reports exist
        id: check
        env:
          INPUT_PHASE: ${{ github.event.inputs.phase || 'observe,assess,update,governance,report' }}
          REPORT_FORCE: ${{ github.event.inputs.force-report || github.event_name != 'workflow_dispatch' }}
          REPORT_CACHED: ${{ steps.butler.outputs.report_cached }}
        run: |
          if [ -d reports ] && [ -f reports/index.html ]; then
            echo "has-reports=true" >> "$GITHUB_OUTPUT"
          elif [[ "${REPORT_CACHED}" == "true" ]]; then
            # REPORT ran and cache-hit: the snapshot was unchanged, so no new
            # index.html is written and the live dashboard is already current.
            # This is a healthy skip, not a deploy failure — no redeploy needed.
            # Distinguishes a legitimate cache-hit from missing output (#216).
            echo "has-reports=false" >> "$GITHUB_OUTPUT"
            echo "REPORT cache-hit — snapshot unchanged, dashboard already current; skipping redeploy."
          else
            echo "has-reports=false" >> "$GITHUB_OUTPUT"
            # Report was expected, did NOT cache-hit, yet produced no index.html —
            # a silent deploy failure. Surface it so we don't ship a stale
            # dashboard while the workflow reports success. See #216.
            if [[ ",${INPUT_PHASE}," == *",report,"* ]] \
              || [[ ",${INPUT_PHASE}," == *",all,"* ]] \
              || [[ "${REPORT_FORCE}" == "true" ]]; then
              echo "::error::REPORT phase was expected (phase=${INPUT_PHASE}, force=${REPORT_FORCE}) but reports/index.html was not produced and it was not a cache-hit. The dashboard will not be redeployed."
              exit 1
            fi
          fi

      - name: Upload Pages artifact
        if: steps.check.outputs.has-reports == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: reports
          # Required so reports/.nojekyll and reports/.well-known/agent-card.json
          # are included in the tarball; the action's default strips dotfiles.
          include-hidden-files: true

  deploy-pages:
    if: needs.run.outputs.has-reports == 'true'
    needs: run
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
