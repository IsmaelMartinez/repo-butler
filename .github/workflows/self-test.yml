name: Repo Butler

on:
  schedule:
    # Four runs daily across UK waking hours (no overnight runs):
    #   07:00 UTC (08:00 BST / 07:00 GMT — morning)
    #   11:00 UTC (12:00 BST / 11:00 GMT — midday)
    #   16:00 UTC (17:00 BST / 16:00 GMT — late afternoon)
    #   20:00 UTC (21:00 BST / 20:00 GMT — evening)
    # GitHub cron is best-effort — may be delayed or dropped during high-demand
    # periods (observed ~80% miss rate on this repo). The push trigger below
    # acts as a reliable fallback; four cron times also gives more chances
    # to catch a successful run per day.
    - cron: '0 7,11,16,20 * * *'
  push:
    branches: [main]
    paths:
      # Re-run the report when pipeline code or workflow config changes.
      - 'src/report*.js'
      - 'src/observe.js'
      - 'src/store.js'
      - '.github/workflows/self-test.yml'
      - '.github/roadmap.yml'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase(s) to run. Single phase, comma-separated list (e.g. "observe,assess,update,governance,report"), or "all".'
        required: false
        default: 'observe,assess,update,governance,report'
      dry-run:
        description: 'Dry run (true/false)'
        required: false
        default: 'true'
      force-report:
        description: 'Force report regeneration even if unchanged'
        type: boolean
        required: false
        default: false

permissions:
  issues: write
  pull-requests: write
  contents: write
  pages: write
  id-token: write
  security-events: read

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      has-reports: ${{ steps.check.outputs.has-reports }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Repo Butler
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_PHASE: ${{ github.event.inputs.phase || 'observe,assess,update,governance,report' }}
          INPUT_CONFIG_PATH: .github/roadmap.yml
          INPUT_DRY_RUN: ${{ github.event.inputs.dry-run || 'true' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TRIAGE_BOT_INGEST_SECRET: ${{ secrets.TRIAGE_BOT_INGEST_SECRET }}
          REPORT_OUTPUT_DIR: reports
          REPORT_FORCE: ${{ github.event.inputs.force-report || github.event_name != 'workflow_dispatch' }}
        run: node src/index.js

      - name: Check reports exist
        id: check
        run: |
          if [ -d reports ] && [ -f reports/index.html ]; then
            echo "has-reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-reports=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        if: steps.check.outputs.has-reports == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: reports

  deploy-pages:
    if: needs.run.outputs.has-reports == 'true'
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
