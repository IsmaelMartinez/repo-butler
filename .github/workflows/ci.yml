name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Check for API key leaks
        run: |
          # Ensure no API keys are hardcoded in source files
          # Exclude safety.js and test files (they contain patterns and fixtures, not real keys)
          if grep -rn 'AIza\|sk-ant-\|sk-[a-zA-Z0-9]\{40\}\|-----BEGIN RSA PRIVATE KEY-----\|-----BEGIN EC PRIVATE KEY-----\|github_pat_' src/ --include='*.js' --exclude='safety.js' --exclude='*.test.js'; then
            echo "ERROR: Potential API key found in source code"
            exit 1
          fi

      - name: Check for unsafe URL patterns
        run: |
          # Ensure API keys are not in URL query parameters
          if grep -rn 'key=.*apiKey\|key=.*this\.' src/ --include='*.js' --exclude='safety.js' --exclude='*.test.js'; then
            echo "ERROR: API key passed in URL query parameter"
            exit 1
          fi
