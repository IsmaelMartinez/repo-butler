name: Repo Butler Weekly Ideate

# Runs the expensive deep-provider IDEATE phase (council deliberation) plus a
# DRY-RUN PROPOSE pass on a weekly cadence. PROPOSE files no issues while
# INPUT_DRY_RUN is 'true' (the default): the `require_approval && !dryRun`
# short-circuit is bypassed when dryRun is already true, so execution reaches
# the soak log only — "DRY RUN — would create issue …" lines recording each
# idea's resolved destination, and (ADR-011) which cross-repo nudges would
# route to another repo versus fall back to the host backlog. This is the
# month-long dry-run soak that gates graduating any cross-repo class live (G10).
# The cross-repo allow-lists (propose-targets / propose-classes in roadmap.yml)
# stay empty for now, so every targeted idea falls back to the host and the log
# surfaces the candidate flow without filing any issues. (The only writes PROPOSE
# still makes in dry-run are the idempotent host-label ensure — a no-op once the
# proposal/agent labels exist on this repo — and the soak-ledger append below,
# both on this host repo and never a cross-repo write.) A live
# cross-repo write additionally requires BOTH maps populated AND
# require_approval:false AND INPUT_DRY_RUN:false — three deliberate, separately-
# reviewed flips. Each run's routing records also persist to a rolling ledger at
# snapshots/propose-soak.json on the repo-butler-data branch (max 26 entries),
# so the graduation review reads a durable history rather than scraping these
# Actions logs before they age out.
#
# Note: governance detection runs implicitly inside `runIdeate` via
# `runGovernance` (idempotent — no-op if already populated this turn).
# We don't list `governance` explicitly in INPUT_PHASE because the daily
# pipeline already runs it 4x/day; the weekly run gets fresh findings
# either way via the implicit delegation.

on:
  schedule:
    # Mondays at 06:00 UTC — after the daily observe/assess/report at 02:00.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (true/false)'
        required: false
        default: 'true'

# All API reads/writes use the GitHub App token generated in the job, not the
# workflow GITHUB_TOKEN — the default token only needs read access for checkout.
permissions:
  contents: read

jobs:
  ideate:
    runs-on: ubuntu-latest
    concurrency:
      group: repo-butler-weekly-ideate
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Observe + Ideate + Propose (dry-run soak)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_PHASE: observe,ideate,propose
          INPUT_CONFIG_PATH: .github/roadmap.yml
          INPUT_DRY_RUN: ${{ github.event.inputs.dry-run || 'true' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: node src/index.js
