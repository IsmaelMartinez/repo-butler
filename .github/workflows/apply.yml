name: Governance Apply

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (log only, no PRs)'
        default: 'true'
      tools:
        description: 'Comma-separated tools to apply (blank = all actionable; "dependabot-rebase" = nudge stale Dependabot PRs only; "code-review-bot" = enable Copilot review rulesets only; "dependabot-security" = enable GitHub Dependabot security updates on dependabot-sourced open-vulnerability repos only — ADR-012 settings write, manual dispatch only, needs App administration: write to go live). Both settings writes are dry-run by default.'
        required: false
      max-apply-per-run:
        description: 'Max PRs to open (default 5)'
        required: false
        default: '5'

# Cross-repo writes use the GitHub App token generated in the job, not the
# workflow GITHUB_TOKEN — the default token only needs read access for checkout.
permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run apply phase
        id: apply
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_PHASE: apply
          INPUT_CONFIG_PATH: .github/roadmap.yml
          INPUT_DRY_RUN: ${{ github.event.inputs.dry-run || 'true' }}
          INPUT_TOOLS: ${{ github.event.inputs.tools || '' }}
          INPUT_MAX_APPLY_PER_RUN: ${{ github.event.inputs.max-apply-per-run || '5' }}
        run: node src/index.js

      - name: Run summary
        # The ADR-009 / ADR-012 settings writes (Copilot review, Dependabot
        # security updates) open no PR, so this summary IS their audit record —
        # the "see what it did" moment a PR diff would otherwise provide. Emitted
        # for every manual dispatch, dry-run or live.
        if: always()
        env:
          APPLY: ${{ steps.apply.outputs.apply }}
          NUDGE: ${{ steps.apply.outputs.nudge }}
          COPILOT_REVIEW: ${{ steps.apply.outputs.copilotReview }}
          DEPENDABOT_SECURITY: ${{ steps.apply.outputs.dependabotSecurity }}
          DRY_RUN: ${{ github.event.inputs.dry-run || 'true' }}
        run: |
          mode="dry-run"
          [ "$DRY_RUN" = "false" ] && mode="LIVE"
          {
            echo "## Governance Apply ($mode)"
            echo ""
            echo "Manual dispatch (ADR-005 gate 1). The two settings writes below open no PR, so this line is their audit record."
            echo ""
            echo "- Apply summary: \`${APPLY:-(none — dry-run or nothing actionable)}\`"
            echo "- Nudge summary: \`${NUDGE:-(none — dry-run or nothing actionable)}\`"
            echo "- Copilot-review (settings write) summary: \`${COPILOT_REVIEW:-(none — not requested or nothing actionable)}\`"
            # ADR-012: manual-dispatch only — this is the ONLY workflow that runs
            # the Dependabot security-updates settings write.
            echo "- Dependabot-security (settings write) summary: \`${DEPENDABOT_SECURITY:-(none — not requested or nothing actionable)}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Governance apply ($mode)::apply=${APPLY:-none} nudge=${NUDGE:-none} copilotReview=${COPILOT_REVIEW:-none} dependabotSecurity=${DEPENDABOT_SECURITY:-none}"
