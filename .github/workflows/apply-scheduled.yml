name: Governance Apply (scheduled)

# Stage 4 (ADR-007): the no-human-at-dispatch apply path. Unlike apply.yml
# (workflow_dispatch only, ADR-005 gate 1), this runs on a schedule. Graduated to
# live 2026-06-15: the weekly cron run defaults to live (writes), acting only on
# the finding classes promoted via `apply-schedule` in roadmap.yml; a manual
# workflow_dispatch still defaults to dry-run. require_approval, the per-run cap,
# batching, and repo-name validation (ADR-005 gates 2-5) all still apply, so a
# scheduled run opens no more PRs than a dispatched one and nothing merges itself.

on:
  schedule:
    # Weekly, low-traffic slot — avoids the daily self-test (07/11/16/20),
    # the 6-hourly monitor (00/06/12/18) and the Monday 06:00 ideate run.
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (log only, no PRs)'
        default: 'true'
      tools:
        description: 'Comma-separated tools to apply (blank = all allow-listed actionable; "dependabot-rebase" = nudge stale Dependabot PRs only)'
        required: false
      max-apply-per-run:
        description: 'Max PRs to open (default 5)'
        required: false
        default: '5'

# Cross-repo writes use the GitHub App token generated in the job, not the
# workflow GITHUB_TOKEN — the default token only needs read access for checkout.
permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run apply phase
        id: apply
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_PHASE: apply
          INPUT_CONFIG_PATH: .github/roadmap.yml
          # Stage-4 live (2026-06-15): the scheduled cron run writes; a manual
          # workflow_dispatch stays dry-run unless explicitly set false.
          INPUT_DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || (github.event.inputs.dry-run || 'true') }}
          INPUT_TOOLS: ${{ github.event.inputs.tools || '' }}
          INPUT_MAX_APPLY_PER_RUN: ${{ github.event.inputs.max-apply-per-run || '5' }}
          # Marks this as the no-human scheduled path: apply.js gates each finding
          # class behind the apply-schedule allow-list.
          INPUT_SCHEDULED: 'true'
          # Stage 5 (ADR-007): auto-merge fires only on the real scheduled cron,
          # never on a manual workflow_dispatch of this workflow — so a hands-on
          # dispatch (even with dry-run=false) opens PRs without auto-merging.
          # A manual auto-merge reconcile is still possible via tools=automerge.
          INPUT_AUTOMERGE: ${{ github.event_name == 'schedule' && 'true' || '' }}
        run: node src/index.js

      - name: Run summary
        # Replaces the dispatch-time accountability moment ADR-005 relies on: a
        # hands-off run records what it did so the operator learns without digging.
        if: always()
        env:
          APPLY: ${{ steps.apply.outputs.apply }}
          NUDGE: ${{ steps.apply.outputs.nudge }}
          AUTOMERGE: ${{ steps.apply.outputs.automerge }}
          COPILOT_REVIEW: ${{ steps.apply.outputs.copilotReview }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || (github.event.inputs.dry-run || 'true') }}
        run: |
          mode="dry-run"
          [ "$DRY_RUN" = "false" ] && mode="LIVE"
          {
            echo "## Scheduled Governance Apply ($mode)"
            echo ""
            echo "Ran without a human at dispatch (ADR-007 stage 4). Finding classes act only when promoted via \`apply-schedule\` in roadmap.yml. Auto-merge (stage 5) acts only on classes in \`apply-automerge\`."
            echo ""
            echo "- Apply summary: \`${APPLY:-(none — dry-run or nothing actionable)}\`"
            echo "- Nudge summary: \`${NUDGE:-(none — dry-run or nothing actionable)}\`"
            echo "- Auto-merge summary: \`${AUTOMERGE:-(none — empty allow-list or nothing green)}\`"
            # The ADR-009 settings write has no PR to point at afterwards, so this
            # line IS its audit record — it must never be dropped from the summary.
            echo "- Copilot-review (settings write) summary: \`${COPILOT_REVIEW:-(none — not allow-listed or nothing actionable)}\`"
            # ADR-012: the Dependabot security-updates settings write is fenced OFF
            # this no-human scheduled path BY CONSTRUCTION — it delegates autonomous
            # PR generation to GitHub, so it is never dispatched here and is not
            # allow-listable. It runs on the manual apply.yml only.
            echo "- Dependabot-security (settings write): not run here — manual-dispatch only by construction (ADR-012)."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Scheduled apply ($mode)::apply=${APPLY:-none} nudge=${NUDGE:-none} automerge=${AUTOMERGE:-none} copilotReview=${COPILOT_REVIEW:-none} dependabotSecurity=off-by-construction"
