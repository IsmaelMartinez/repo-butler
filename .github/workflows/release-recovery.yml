name: Release recovery

# One-off gold-tier recovery dispatch: cuts an immediate patch release (with
# generated notes) on each listed portfolio repo whose release cadence has
# lapsed. Same guard rails as the release-cadence standard template: skips a
# repo with no published release, a non-semver latest tag, or no commits since
# the latest release. Uses the GitHub App token for cross-repo access, like
# apply.yml. Intended to be dispatched manually and removed once the
# release-cadence workflow PRs are merged across the portfolio.

on:
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated short repo names to release'
        required: true
      dry-run:
        description: 'Dry run (log the plan, create nothing)'
        default: 'true'

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Cut patch releases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPOS: ${{ github.event.inputs.repos }}
          DRY_RUN: ${{ github.event.inputs.dry-run || 'true' }}
        run: |
          set -euo pipefail
          IFS=',' read -ra repos <<< "$REPOS"
          for repo in "${repos[@]}"; do
            repo=$(echo "$repo" | xargs)
            [ -z "$repo" ] && continue
            if ! [[ "$repo" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "::warning::$repo: invalid repo name — skipping."
              continue
            fi
            echo "--- $OWNER/$repo ---"
            release=$(gh api "repos/$OWNER/$repo/releases/latest" --jq '[.tag_name, .published_at] | join(",")' 2>/dev/null || true)
            if [ -z "$release" ]; then
              echo "$repo: no published release yet — skipping; the first release stays a human decision."
              continue
            fi
            IFS=',' read -r tag published <<< "$release"
            if [[ "$tag" =~ ^(v?)([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              next="${BASH_REMATCH[1]}${BASH_REMATCH[2]}.${BASH_REMATCH[3]}.$(( 10#${BASH_REMATCH[4]} + 1 ))"
            else
              echo "$repo: latest tag $tag is not plain semver — skipping rather than guessing a scheme."
              continue
            fi
            default_branch=$(gh api "repos/$OWNER/$repo" --jq '.default_branch')
            ahead=$(gh api "repos/$OWNER/$repo/compare/$tag...$default_branch" --jq '.ahead_by' 2>/dev/null || echo 0)
            if [ "$ahead" -eq 0 ]; then
              echo "$repo: no commits on $default_branch since $tag — nothing to release, skipping."
              continue
            fi
            echo "$repo: latest $tag (published $published), $ahead commit(s) ahead on $default_branch -> next $next"
            if [ "$DRY_RUN" = "true" ]; then
              echo "$repo: [DRY RUN] would create release $next with generated notes."
            else
              gh release create "$next" --repo "$OWNER/$repo" --target "$default_branch" --generate-notes
              echo "$repo: created release $next."
            fi
          done
