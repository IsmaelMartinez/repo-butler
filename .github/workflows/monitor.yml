name: Repo Butler Monitor

# Continuous monitoring: runs on events and every 15 minutes.
# Detects new threats, issues, PRs, security alerts, and CI failures.
# Events are triaged by the agent council (product, dev, stability, maintainability, security).

on:
  schedule:
    - cron: '0 */6 * * *'     # Every 6 hours (was every 15 min — saturated GitHub's schedule queue)
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, labeled, ready_for_review]
  workflow_dispatch:
    inputs:
      council-mode:
        description: 'Council deliberation mode (quick or full)'
        required: false
        default: 'quick'

# All API reads/writes use the GitHub App token generated in the job, not the
# workflow GITHUB_TOKEN — the default token only needs read access for checkout.
permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    # Limit concurrency so only one monitor runs at a time.
    concurrency:
      group: repo-butler-monitor
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Monitor + Council Triage
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_PHASE: monitor
          INPUT_CONFIG_PATH: .github/roadmap.yml
          INPUT_DRY_RUN: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          COUNCIL_MODE: ${{ github.event.inputs.council-mode || 'quick' }}
        run: node src/index.js --phase=monitor
