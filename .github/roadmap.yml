repository: IsmaelMartinez/repo-butler

roadmap:
  path: ROADMAP.md

schedule:
  assess: daily
  ideate: weekly

providers:
  default: gemini

context: |
  Repo Butler is a continuous roadmap planner agent that runs on a schedule,
  analyses the state of GitHub repositories, maintains a living roadmap,
  generates improvement ideas, and proposes work as issues.
  It eats its own dog food — this config makes the agent plan its own roadmap.

limits:
  max_issues_per_run: 3
  require_approval: true

observe:
  issues_closed_days: 90
  prs_merged_days: 90
  releases_count: 10

# Portfolio standards — declared policies the governance engine checks every
# eligible repo against (src/governance.js STANDARD_DETECTORS).
# Value is either "universal" (applies to all repos) or an ecosystem language
# (e.g. "javascript") to scope by detected ecosystem.
standards:
  license: universal
  issue-form-templates: universal
  contributing-guide: universal
  ci-workflows: universal
  dependabot-actions: universal
  code-scanning: universal
  secret-scanning: universal

release_exempt: sound3fy

# By-design divergences from the portfolio policy. Each key is a drift
# category (license, ci-reliability, community-health) and the value is a
# comma-separated list of repos exempt from that check.
#   - teams-for-linux is GPL-3.0 by design (Electron app, copyleft fits the
#     project's distribution model)
#   - bonnie-wee-plot ships a custom Community Allotment Licence
#     (non-commercial for third parties), which GitHub correctly reports as
#     NOASSERTION rather than a SPDX identifier
policy-drift-exempt:
  license: teams-for-linux,bonnie-wee-plot
