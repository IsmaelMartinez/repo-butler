repository: IsmaelMartinez/repo-butler

roadmap:
  path: ROADMAP.md

schedule:
  assess: daily
  ideate: weekly

providers:
  default: gemini

context: |
  Repo Butler is a continuous roadmap planner agent that runs on a schedule,
  analyses the state of GitHub repositories, maintains a living roadmap,
  generates improvement ideas, and proposes work as issues.
  It eats its own dog food — this config makes the agent plan its own roadmap.

limits:
  max_issues_per_run: 3
  require_approval: true

observe:
  issues_closed_days: 90
  prs_merged_days: 90
  releases_count: 10

# Portfolio standards — declared policies the governance engine checks every
# eligible repo against (src/governance.js STANDARD_DETECTORS).
# Value is either "universal" (applies to all repos) or an ecosystem language
# (e.g. "javascript") to scope by detected ecosystem.
standards:
  license: universal
  issue-form-templates: universal
  contributing-guide: universal
  ci-workflows: universal
  dependabot-actions: universal
  code-scanning: universal
  secret-scanning: universal
  dependabot-auto-merge: universal
  codeowners: universal
  security-md: universal

release_exempt: sound3fy

# By-design divergences from the portfolio policy. Each key is a drift
# category (license, ci-reliability, community-health) and the value is a
# comma-separated list of repos exempt from that check.
#   - teams-for-linux is GPL-3.0 by design (Electron app, copyleft fits the
#     project's distribution model)
#   - bonnie-wee-plot ships a custom Community Allotment Licence
#     (non-commercial for third parties), which GitHub correctly reports as
#     NOASSERTION rather than a SPDX identifier
policy-drift-exempt:
  license: teams-for-linux,bonnie-wee-plot

# Per-tool override for the Governance Apply per-run PR cap (ADR-007 stage 3).
# Each key is a templatable tool name; the value is the max PRs that tool may
# open in a single apply run. Tools not listed fall back to the global cap
# (the workflow's max-apply-per-run input, default 5), which always remains the
# backstop. Blast-radius sizing only — every other ADR-005 gate (require_approval,
# dry-run, no-cron, batching, repo-name validation) is unaffected. Uncomment to use:
# apply-cap:
#   code-scanning: 10
#   dependabot-actions: 5

# Per-finding-class promotion allow-list for the SCHEDULED apply path (ADR-007
# stage 4). A class listed here as `tool: true` runs on the no-human scheduled
# apply workflow; classes not listed stay workflow_dispatch-only. This is the
# per-class, opt-in, reversible relaxation of ADR-005 gate 1 — require_approval,
# dry-run, batching, the per-run cap and repo-name validation all still apply, so
# a scheduled run can open no more PRs than a dispatched one. Empty/absent means
# the scheduled run opens nothing. `dependabot-rebase` promotes the stale-PR nudge.
#
# Every actionable class is promoted here, but apply-scheduled.yml still defaults
# the cron run to dry-run (INPUT_DRY_RUN=true), so the scheduled path only LOGS
# the PRs it would open — no cross-repo writes until the cron default flips to
# live in a follow-up. The manual dispatch path (apply.yml) ignores this block
# entirely. Remove a key to demote that class back to dispatch-only.
apply-schedule:
  code-scanning: true
  dependabot-actions: true
  issue-form-templates: true
  dependabot-auto-merge: true
  codeowners: true
  security-md: true
  dependabot-rebase: true
