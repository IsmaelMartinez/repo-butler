repository: IsmaelMartinez/repo-butler

roadmap:
  path: ROADMAP.md
  # Age (days) after which a completed ~~SHIPPED~~ subsection's verbose body is
  # compacted to a one-line pointer by the UPDATE phase (full prose stays in git
  # history). Default 60. Lower it to trim more aggressively.
  # compact_after_days: 60

schedule:
  assess: daily
  ideate: weekly

providers:
  default: gemini

context: |
  Repo Butler is a continuous roadmap planner agent that runs on a schedule,
  analyses the state of GitHub repositories, maintains a living roadmap,
  generates improvement ideas, and proposes work as issues.
  It eats its own dog food — this config makes the agent plan its own roadmap.

limits:
  max_issues_per_run: 3
  require_approval: true

observe:
  issues_closed_days: 90
  prs_merged_days: 90
  releases_count: 10

# Portfolio standards — declared policies the governance engine checks every
# eligible repo against (src/governance.js STANDARD_DETECTORS).
# Value is either "universal" (applies to all repos) or an ecosystem language
# (e.g. "javascript") to scope by detected ecosystem.
standards:
  license: universal
  issue-form-templates: universal
  contributing-guide: universal
  ci-workflows: universal
  dependabot-actions: universal
  code-scanning: universal
  secret-scanning: universal
  dependabot-auto-merge: universal
  codeowners: universal
  security-md: universal
  # AI code review coverage: an active copilot_code_review repository ruleset.
  # Routes to the `settings` executor — a PR-less ruleset write (ADR-009), run on
  # the manual apply.yml dispatch (tools=code-review-bot), dry-run by default. NOT
  # on the apply-schedule allow-list below, and going live needs the GitHub App's
  # administration:write scope.
  code-review-bot: universal

release_exempt: sound3fy

# By-design divergences from the portfolio policy. Each key is a drift
# category (license, ci-reliability, community-health) and the value is a
# comma-separated list of repos exempt from that check.
#   - teams-for-linux is GPL-3.0 by design (Electron app, copyleft fits the
#     project's distribution model)
#   - bonnie-wee-plot ships a custom Community Allotment Licence
#     (non-commercial for third parties), which GitHub correctly reports as
#     NOASSERTION rather than a SPDX identifier
policy-drift-exempt:
  license: teams-for-linux,bonnie-wee-plot

# Per-tool override for the Governance Apply per-run PR cap (ADR-007 stage 3).
# Each key is a templatable tool name; the value is the max PRs that tool may
# open in a single apply run. Tools not listed fall back to the global cap
# (the workflow's max-apply-per-run input, default 5), which always remains the
# backstop. Blast-radius sizing only — every other ADR-005 gate (require_approval,
# dry-run, no-cron, batching, repo-name validation) is unaffected. Uncomment to use:
# apply-cap:
#   code-scanning: 10
#   dependabot-actions: 5

# Per-finding-class promotion allow-list for the SCHEDULED apply path (ADR-007
# stage 4). A class listed here as `tool: true` runs on the no-human scheduled
# apply workflow; classes not listed stay workflow_dispatch-only. This is the
# per-class, opt-in, reversible relaxation of ADR-005 gate 1 — require_approval,
# dry-run, batching, the per-run cap and repo-name validation all still apply, so
# a scheduled run can open no more PRs than a dispatched one. Empty/absent means
# the scheduled run opens nothing. `dependabot-rebase` promotes the stale-PR nudge.
#
# Every actionable class is promoted here, and as of 2026-06-15 (ADR-007 stage-4
# live graduation) apply-scheduled.yml runs the weekly cron LIVE — it opens the
# PRs / posts the nudges for these classes without a human at dispatch. Each PR is
# still human-reviewed and merged; nothing auto-merges. A manual workflow_dispatch
# of apply-scheduled.yml stays dry-run by default. The manual dispatch path
# (apply.yml) ignores this block entirely. Remove a key to demote that class back
# to dispatch-only. code-review-bot is intentionally absent — it is a settings
# write with no PR-review moment, so it stays manual-dispatch-only per ADR-009.
apply-schedule:
  code-scanning: true
  dependabot-actions: true
  issue-form-templates: true
  dependabot-auto-merge: true
  codeowners: true
  security-md: true
  dependabot-rebase: true

# Per-finding-class AUTO-MERGE allow-list (ADR-007 stage 5). A deterministic
# template class listed here as `tool: true` lets the butler squash-merge its OWN
# green governance-apply PRs for that class on the scheduled reconcile pass — the
# one deliberately-sanctioned autonomous merge in the project, never for
# human-authored PRs and never global. Bounded to the template tools; settings
# (code-review-bot), the dependabot-rebase nudge, and every policy-drift /
# tier-uplift / agent / manual finding are never eligible. Preconditions: required
# CI green AND the PR mergeable; merges are squash (one clean revert commit) with
# the merge SHA recorded. Default empty (commented out) = default-closed, nothing
# auto-merges. Enable a class deliberately, as its own reviewed change, once its
# templated PRs have a clean human-reviewed-and-merged track record. Kill switches:
# remove the key here, set require_approval false (halts all apply), or disable
# apply-scheduled.yml.
#
# Enabled 2026-06-16: dependabot-actions is the first class promoted to auto-merge.
# It is the lowest-risk deterministic template (a static .github/dependabot.yml — a
# config file, no CI execution), it is already on the apply-schedule allow-list, and
# its config PRs have a clean human-reviewed-and-merged track record (the 2026-05-01
# Dependabot config audit + the stage-4 unblock PRs). The butler will squash-merge
# its OWN green dependabot-actions apply PR once CI passes; nothing else auto-merges.
# Add more classes here one at a time, each as its own reviewed change.
apply-automerge:
  dependabot-actions: true
  # Enabled 2026-06-16: security-md, the second class. A purely additive
  # .github/SECURITY.md doc — no CI execution, no behaviour change — with a clean
  # merged track record (the 2026-06-07/08 security-md sweep). Lowest-risk class
  # after dependabot-actions; promoted next in the one-at-a-time rollout.
  security-md: true
  # Enabled 2026-06-16: codeowners, the third class. A purely additive
  # .github/CODEOWNERS file (`* @<owner>`, no CI execution); on a single-maintainer
  # estate it routes review to the owner without blocking merges. Clean merged
  # track record (the 2026-06-07/08 codeowners sweep + the yourear #47 canary).
  codeowners: true
  # Enabled 2026-06-16: code-scanning, the fourth class. Adds a CodeQL workflow
  # (.github/workflows/codeql-analysis.yml) — the one class so far that adds an
  # EXECUTING workflow rather than a static doc/config. Safe to auto-merge because
  # the template carries an `on: pull_request` trigger, so CodeQL runs on the apply
  # PR itself and the CI-green precondition validates it before any merge. Strongest
  # track record of all classes (the 2026-05-01 13/13-repo code-scanning rollout).
  code-scanning: true
