name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `npm start` with ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any error messages or logs.
      render: shell
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "22.x"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04, macOS 15, etc."
